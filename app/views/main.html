<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <link rel="stylesheet" href="assets/styles/main.css" />
    <title>Spawn</title>
  </head>
  <body class="vh-100 d-flex flex-column overflow-hidden">
    <div class="d-flex align-items-center flex-column mx-auto w-100">
      <div id="chevronDiv">
        <div class="mx-auto">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            fill="currentColor"
            class="bi bi-chevron-compact-down w-100 opacity-75"
            viewBox="0 0 16 16">
            <path
              fill-rule="evenodd"
              d="M1.553 6.776a.5.5 0 0 1 .67-.223L8 9.44l5.776-2.888a.5.5 0 1 1 .448.894l-6 3a.5.5 0 0 1-.448 0l-6-3a.5.5 0 0 1-.223-.67" />
          </svg>
        </div>
      </div>
      <div id="navDiv" class="d-flex justify-content-center nav-visible w-100">
        <div id="books">
          <button
            class="btn btn-light dropdown-toggle"
            type="button"
            data-bs-toggle="dropdown"
            data-bs-auto-close="false"
            aria-expanded="false"
            style="width: 180px">
            Livro
          </button>
          <ul class="dropdown-menu mt-2 overflow-hidden overflow-y-auto">
            <li id="versions" class="d-none">
              <button class="dropdown-item px-3" type="button">Versões</button>
            </li>
            <hr class="my-1 d-none" />
            <div id="chapters" class="container text-center d-none" style="width: 320px">
              <div class="row row-cols-5">
                <div class="col py-1 px-2 d-none">
                  <button type="button" class="btn btn-light w-100"></button>
                </div>
              </div>
            </div>
          </ul>
        </div>

        <!-- <div id="versions" class="position-absolute end-0">
          <button class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            Versão
          </button>
          <ul class="dropdown-menu mt-2">
            <li><a class="dropdown-item" href="#"></a></li>
          </ul>
        </div> -->
      </div>
    </div>

    <div id="verses" class="container-fluid flex-grow-1 overflow-y-auto mt-1 mb-5">
      <div class="h-100 overflow-y-auto">
        <span class="verseTemplate d-none">
          <sup class="verse-number text-primary text-opacity-75 z-n1">1</sup>
          <span class="verse-text fs-5"> Lorem ipsum dolor sit amet consectetur adipisicing elit... </span>
        </span>
      </div>
    </div>
  </body>
</html>
<script type="module" src="src/views/main.js"></script>
